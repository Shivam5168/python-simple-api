name: Build and Deploy FastAPI to Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Python Version
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      # We only use this local venv to run quick checks or testing scripts if needed
      - name: Create and activate virtual environment
        run: |
          python -m venv venv
          source venv/bin/activate

      - name: Install Dependencies locally
        run: |
          pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # FIX: We intentionally exclude local 'venv ' or 'antenv' folders from the zip artifact.
      # This keeps the upload fast. Azure will build its own clean production venv using your requirements.txt file.
      - name: Upload Artifact for Deployment Job
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            ./*
            !.github
            !venv
            !antenv

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'

    steps:
      - name: Download Artifact from Build jobs
        uses: actions/download-artifact@v4
        with:
          name: python-app

      # ZERO SUBSCRIPTION CHECK: Deploys directly using your isolated publish profile token
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .
